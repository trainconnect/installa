<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto su TrainConnect Sicilia</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --text: #1C1C1E;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #8E8E93;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 18px;
            transition: transform 0.2s, opacity 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .secondary-links {
            margin-top: 30px;
            display: none;
        }
        .secondary-links a {
            display: block;
            color: var(--primary);
            text-decoration: none;
            margin: 10px 0;
            font-size: 14px;
        }
        #desktop-msg {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TrainConnect Sicilia</h1>
        <p id="description">Scarica l'app che connette il per il personale viaggiante della Sicilia.</p>
        
        <a id="main-btn" href="#" class="btn">Scarica l'app</a>

        <div id="desktop-msg">
            <p>Sei su un computer desktop. Scarica l'app sul tuo smartphone:</p>
            <a href="https://testflight.apple.com/join/tE5uqVCk" style="color: var(--primary); text-decoration: none; display: block; margin-bottom: 10px;">iOS (TestFlight)</a>
            <a href="https://play.google.com/store/apps/details?id=com.fradimar.trainconnectsiciliaapp" style="color: var(--primary); text-decoration: none; display: block;">Android (Google Play)</a>
        </div>

        <div id="fallback" class="secondary-links">
            <hr style="border: 0; border-top: 1px solid #E5E5EA; margin: 20px 0;">
            <p style="font-size: 12px;">Non è il tuo sistema? Usa questi link:</p>
            <a id="alt-link" href="#">Link alternativo</a>
        </div>
    </div>

    <script>
        const links = {
            android: "https://play.google.com/store/apps/details?id=com.fradimar.trainconnectsiciliaapp",
            ios: "https://testflight.apple.com/join/tE5uqVCk"
        };

        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const mainBtn = document.getElementById('main-btn');
        const fallback = document.getElementById('fallback');
        const altLink = document.getElementById('alt-link');
        const desktopMsg = document.getElementById('desktop-msg');
        const description = document.getElementById('description');

        if (/android/i.test(userAgent)) {
            mainBtn.href = links.android;
            mainBtn.innerText = "Scarica per Android";
            altLink.href = links.ios;
            altLink.innerText = "Scarica versione iOS";
            fallback.style.display = "block";
        } 
        else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            mainBtn.href = links.ios;
            mainBtn.innerText = "Scarica per iOS";
            altLink.href = links.android;
            altLink.innerText = "Scarica versione Android";
            fallback.style.display = "block";
        } 
        else {
            // Desktop
            mainBtn.style.display = "none";
            description.style.display = "none";
            desktopMsg.style.display = "block";
        }
    </script>
</body>
</html>
